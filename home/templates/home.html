<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Tyto Supermarket{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --teal-700: #0d9488;
            --teal-600: #14b8a6;
            --teal-500: #20c997;
        }

        body {
            background: linear-gradient(135deg, #0f172a 0%, #134e4a 50%, #0f172a 100%);
            color: #e2e8f0;
            font-family: 'Segoe UI', Tahoma, Verdana, sans-serif;
            min-height: 100vh;
        }

        .navbar {
            background: rgba(13, 148, 136, 0.1) !important;
            border-bottom: 1px solid rgba(20, 184, 166, 0.3);
            backdrop-filter: blur(10px);
        }

        .navbar-brand {
            font-weight: bold;
            color: var(--teal-600) !important;
            font-size: 1.5rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .nav-link {
            color: #cbd5e1 !important;
            transition: all 0.3s ease;
        }

        .nav-link:hover {
            color: var(--teal-500) !important;
        }


        .botoes {
            margin-top: 5rem;
            display: flex;
        }

        .btn {
            padding: clamp(1rem, 3vw, 2.5rem);
            font-size: clamp(1rem, 2.5vw, 2rem);
        }

        /*botões*/
        .btn-outline-teal {
            color: var(--teal-600);
            border-color: var(--teal-600);
            font-weight: 900;
        }

        .btn-outline-teal:hover {
            background-color: var(--teal-700);
            border-color: var(--teal-700);
        }

        .action-buttons {
            display: flex;
            gap: 8px;
        }


    </style>
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="/home">⚙️ Tyto.Supermarket</a>
    
        </div>
    </nav>
    <div class="botoes d-flex flex-column align-items-center justify-content-center w-100">
        <a class="btn btn-outline-teal mb-3 w-50" href="{% url 'clients_list' %}">
            👤 Clientes
        </a>

        <a class="btn btn-outline-teal mb-3 w-50" href="{% url 'products_list' %}">
            📦 Produtos
        </a>

        <a class="btn btn-outline-teal w-50" href="{% url 'sales_list' %}">
            🧾 Vendas
        </a>
    </div>
    

</body>
</html>
